name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy src/

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aumos
          POSTGRES_PASSWORD: aumos_dev
          POSTGRES_DB: aumos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=aumos_event_bus \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80
        env:
          AUMOS_DATABASE__URL: postgresql+asyncpg://aumos:aumos_dev@localhost:5432/aumos_test
          AUMOS_ENVIRONMENT: test
          AUMOS_EVENTBUS_SCHEMA_REGISTRY_URL: http://localhost:8081
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pip-licenses -e .
      - name: Check for GPL/AGPL dependencies
        run: |
          pip-licenses --format=csv --output-file=licenses.csv
          python3 - <<'EOF'
          import csv, sys
          blocked = {"GPL", "AGPL", "GNU General Public License", "GNU Affero General Public License"}
          violations = []
          with open("licenses.csv") as f:
              for row in csv.DictReader(f):
                  lic = row.get("License", "")
                  if any(b.lower() in lic.lower() for b in blocked):
                      violations.append(f"  {row['Name']} {row['Version']}: {lic}")
          if violations:
              print("BLOCKED licenses found:")
              for v in violations:
                  print(v)
              sys.exit(1)
          print("License check passed.")
          EOF
